services:
  - type: web
    name: resume-builder 
    env: node 
    plan: free 
    region: oregon 
    rootDir: .
    buildCommand: "npm install" 
    startCommand: "npm start" 
    healthCheckPath: / 
    envVars:
      - key: NODE_ENV
        value: production 
      - key: MONGODB_URI
        # This MUST be set in Render's dashboard environment variables
      # Allow Puppeteer to download and manage its own Chromium
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "false"
    buildFilter:
      paths:
        - "models/**"
        - "public/**"
        - "routes/**"
        - "views/**"
        - "middleware/**"
        - "package.json"
        - "package-lock.json" 
        - "server.js"
        - "render.yaml"
        - "config.js"
      ignoredPaths:
        - "*.md"
        - ".gitignore"
        - "docs/**"